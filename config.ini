[colors]
background     = #0d1117
background-alt = #1b2129
foreground     = #a9fef7
primary        = #00f3ff
secondary      = #39ff14
alert          = #f7768e
disabled       = #444444
warn           = #dfff00

[bar/right]
monitor           = DP-2
override-redirect = false
wm-restack        = generic
fixed-center      = true

width         = 100%
height        = 36pt
radius        = 0

background    = ${colors.background}
foreground    = ${colors.foreground}

line-size     = 2pt
border-size   = 1pt
border-color  = ${colors.primary}

padding-left  = 1
padding-right = 1
module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=11;2"

modules-left   = tray sep rofi-menu sep clipboard sep nightmode sep quicknotes sep filemanager sep terminal sep screenshot sep spotify-prev spotify-title spotify-next
modules-center = date-short
modules-right  = klipper sep weather sep network sep mic sep pulseaudio sep audio-switch sep dnd sep nuke sep powermenu

[bar/right-bottom]
monitor           = DP-2
override-redirect = false
wm-restack        = generic
fixed-center      = true
bottom            = true

width         = 100%
height        = 28pt
radius        = 0

background    = ${colors.background}
foreground    = ${colors.foreground}

line-size     = 2pt
border-size   = 1pt
border-color  = ${colors.primary}

padding-left  = 1
padding-right = 1
module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=11;2"

modules-left   =
modules-center = xworkspaces
modules-right  =

[bar/left]
monitor           = HDMI-0
override-redirect = true
wm-restack        = generic
fixed-center      = true

width         = 1080
height        = 36pt
radius        = 0

background    = ${colors.background}
foreground    = ${colors.foreground}

line-size     = 2pt
border-size   = 1pt
border-color  = ${colors.primary}

padding-left  = 1
padding-right = 1
module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=9;2"

modules-left   = cpu-numeric sep-plain cpu-temp sep-plain memory sep-plain filesystem sep-plain date-long sep-plain uptime sep-plain local-ip sep-plain xwindow
modules-center =
modules-right  =

[module/sep]
type             = custom/text
label            = " ⟩ "
label-foreground = ${colors.primary}

[module/sep-plain]
type             = custom/text
label            = " | "
label-foreground = ${colors.disabled}

[module/tray]
type         = internal/tray
tray-spacing = 8px
tray-size    = 65%

[module/rofi-menu]
type             = custom/text
label            = " MENU "
label-foreground = ${colors.secondary}
click-left       = rofi -show drun

[module/clipboard]
type             = custom/text
label            = " COPYBIN "
label-foreground = ${colors.secondary}
click-left       = copyq toggle

[module/nightmode]
type       = custom/script
exec       = ~/.config/polybar/night_mode.sh status
interval   = 5
click-left = ~/.config/polybar/night_mode.sh toggle

[module/quicknotes]
type             = custom/text
label            = " QUICKNOTE "
label-foreground = ${colors.secondary}
click-left       = ~/.config/polybar/quick_notes.sh

[module/filemanager]
type             = custom/text
label            = " FILES "
label-foreground = ${colors.secondary}
click-left       = nemo /home/YOUR_USERNAME

[module/terminal]
type             = custom/text
label            = " TERMINAL "
label-foreground = ${colors.secondary}
click-left       = gnome-terminal

[module/screenshot]
type             = custom/text
label            = " SS "
label-foreground = ${colors.secondary}
click-left       = gnome-screenshot -i

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = false
enable-click   = true
enable-scroll  = true

label-active            = " ● "
label-active-foreground = ${colors.primary}
label-active-background = ${colors.background-alt}
label-active-underline  = ${colors.primary}
label-active-padding    = 1

label-occupied            = " ○ "
label-occupied-foreground = ${colors.secondary}
label-occupied-padding    = 1

label-urgent            = " ! "
label-urgent-foreground = ${colors.alert}
label-urgent-padding    = 1

label-empty            = " ○ "
label-empty-foreground = ${colors.disabled}
label-empty-padding    = 1

[module/spotify-prev]
type             = custom/text
label            = " ◀ "
label-foreground = ${colors.secondary}
click-left       = playerctl -p spotify previous

[module/spotify-title]
type             = custom/script
exec             = ~/.config/polybar/spotify.sh
interval         = 1
label-foreground = ${colors.foreground}
click-left       = playerctl -p spotify play-pause
click-right      = ~/.config/polybar/spotify_notify.sh

[module/spotify-next]
type             = custom/text
label            = " ▶ "
label-foreground = ${colors.secondary}
click-left       = playerctl -p spotify next

[module/date-short]
type     = internal/date
interval = 1
date     = %H:%M
label            = %date%
label-foreground = ${colors.primary}

[module/date-long]
type     = internal/date
interval = 1
date     = %Y-%m-%d %H:%M:%S
label            = %date%
label-foreground = ${colors.primary}

[module/weather]
type     = custom/script
exec     = ~/.config/polybar/weather.sh
interval = 600

[module/memory]
type       = internal/memory
interval   = 3
label            = "RAM %gb_used%"
label-foreground = ${colors.primary}
click-left       = gnome-terminal -- btop

[module/network]
type      = internal/network
interface = YOUR_NETWORK_INTERFACE  # run: ip link | grep "^[0-9]"
interval  = 1

label-connected            = "↓ %downspeed% ↑ %upspeed%"
label-connected-foreground = ${colors.secondary}
label-disconnected            = "NET DOWN"
label-disconnected-foreground = ${colors.alert}

[module/cpu-temp]
type     = custom/script
exec     = ~/.config/polybar/cpu_temp.sh
interval = 5

[module/cpu-graph]
type     = internal/cpu
interval = 0.5

format           = <ramp-coreload>
label-foreground = ${colors.secondary}

ramp-coreload-0          = " "
ramp-coreload-1          = ▂
ramp-coreload-2          = ▃
ramp-coreload-3          = ▄
ramp-coreload-4          = ▅
ramp-coreload-5          = ▆
ramp-coreload-6          = ▇
ramp-coreload-7          = █
ramp-coreload-foreground = ${colors.secondary}

[module/cpu-numeric]
type     = internal/cpu
interval = 2
label            = "CPU %percentage%%"
label-foreground = ${colors.secondary}
click-left       = gnome-terminal -- btop

[module/mic]
type       = custom/script
exec       = ~/.config/polybar/mic.sh status
interval   = 2
click-left = ~/.config/polybar/mic.sh toggle

[module/pulseaudio]
type       = internal/pulseaudio
use-ui-max = false
interval   = 5

label-volume            = "VOL %percentage%%"
label-volume-foreground = ${colors.secondary}
label-muted            = "VOL MUTED"
label-muted-foreground = ${colors.disabled}

click-left  = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up   = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%

[module/audio-switch]
type       = custom/script
exec       = ~/.config/polybar/audio_switch.sh status
interval   = 2
click-left = ~/.config/polybar/audio_switch.sh toggle

[module/dnd]
type       = custom/script
exec       = ~/.config/polybar/dnd.sh status
interval   = 1
click-left = ~/.config/polybar/dnd.sh toggle

[module/nuke]
type             = custom/text
label            = " NUKE "
label-foreground = #ff5555
click-left       = ~/.config/polybar/nuke.sh

[module/powermenu]
type             = custom/text
label            = " PWR "
label-foreground = #ff5555
click-left       = ~/.config/rofi/powermenu.sh

[module/filesystem]
type     = internal/fs
interval = 30
mount-0  = /
label-mounted            = "DISK %percentage_used%%"
label-mounted-foreground = ${colors.secondary}
label-unmounted            = "DISK N/A"
label-unmounted-foreground = ${colors.disabled}

[module/uptime]
type     = custom/script
exec     = ~/.config/polybar/uptime.sh
interval = 60

[module/local-ip]
type                     = custom/script
exec                     = ip route get 1.1.1.1 | awk '{print $7}'
interval                 = 30
format-prefix            = "IP "
format-prefix-foreground = ${colors.disabled}
label-foreground         = ${colors.primary}

[module/klipper]
type       = custom/script
exec       = ~/.config/polybar/klipper.sh
interval   = 10
click-left = xdg-open http://YOUR_KLIPPER_IP &

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/xwindow]
type                   = internal/xwindow
label                  = %title:0:20:...%
label-foreground       = ${colors.foreground}
label-empty            = DESKTOP
label-empty-foreground = ${colors.disabled}
